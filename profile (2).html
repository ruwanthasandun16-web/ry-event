<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | R&Y Event</title>

<link rel="stylesheet" href="css/profile.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-ticket"></i>

<h2>R&Y EVENT</h2>

</div>

<nav>

<a href="home.html">Home</a>

<a href="events.html">Events</a>

<a href="ticket.html">My Ticket</a>

<a href="profile.html" class="active">Profile</a>

<a href="login.html">Logout</a>

</nav>

</header>

<section class="profile-page">

<div class="profile-container">

<!-- LEFT -->

<div class="profile-sidebar">

<img
src="images/user.png"
id="profileImage"
alt="User">

<h2 id="profileName">

Ruwantha Sandun

</h2>

<p>

Premium Member

</p>

<button id="changePhoto">

<i class="fa-solid fa-camera"></i>

Change Photo

</button>

<hr>

<div class="menu">

<a href="#info">

<i class="fa-solid fa-user"></i>

My Profile

</a>

<a href="#tickets">

<i class="fa-solid fa-ticket"></i>

My Tickets

</a>

<a href="#history">

<i class="fa-solid fa-clock-rotate-left"></i>

Booking History

</a>

<a href="#favorites">

<i class="fa-solid fa-heart"></i>

Favorites

</a>

<a href="#settings">

<i class="fa-solid fa-gear"></i>

Settings

</a>

<a href="login.html">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

</div>

<!-- RIGHT -->

<div class="profile-content">

<section id="info">

<h2>

Personal Information

</h2>

<div class="info-grid">

<div class="info-box">

<label>Full Name</label>

<input
type="text"
id="fullName"
value="Ruwantha Sandun">

</div>

<div class="info-box">

<label>Email</label>

<input
type="email"
id="email"
value="ruwantha@example.com">

</div>

<div class="info-box">

<label>Phone</label>

<input
type="text"
id="phone"
value="0771234567">

</div>

<div class="info-box">

<label>Address</label>

<input
type="text"
id="address"
placeholder="Your Address">

</div>

<div class="info-box">

<label>Date of Birth</label>

<input
type="date"
id="dob">

</div>

<div class="info-box">

<label>Gender</label>

<select id="gender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

</div>

<button id="saveProfile">

Save Profile

</button>

</section>
