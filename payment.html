<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | R&Y Event</title>

<link rel="stylesheet" href="css/payment.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- Header -->

<header>

<div class="logo">

<i class="fa-solid fa-ticket"></i>

<h2>R&Y EVENT</h2>

</div>

<nav>

<a href="home.html">Home</a>
<a href="events.html">Events</a>
<a href="booking.html">Booking</a>
<a href="profile.html">Profile</a>

</nav>

</header>

<!-- Payment -->

<section class="payment">

<div class="payment-container">

<!-- Booking Summary -->

<div class="summary-card">

<h2>Booking Summary</h2>

<div class="summary-row">
<span>Event</span>
<span id="eventName">Underground Party</span>
</div>

<div class="summary-row">
<span>Name</span>
<span id="customerName">-</span>
</div>

<div class="summary-row">
<span>Email</span>
<span id="customerEmail">-</span>
</div>

<div class="summary-row">
<span>Tickets</span>
<span id="ticketQty">1</span>
</div>

<div class="summary-row">
<span>Price</span>
<span>Rs. <span id="ticketPrice">3500</span></span>
</div>

<div class="summary-row total">
<span>Total</span>
<span>Rs. <span id="totalPrice">3500</span></span>
</div>

</div>

<!-- Payment Form -->

<div class="payment-card">

<h2>Payment Details</h2>

<form id="paymentForm">

<div class="input-box">

<label>Card Holder Name</label>

<input
type="text"
id="cardName"
placeholder="John Smith"
required>

</div>

<div class="input-box">

<label>Card Number</label>

<input
type="text"
id="cardNumber"
maxlength="19"
placeholder="1234 5678 9012 3456"
required>

</div>

<div class="row">

<div class="input-box">

<label>Expiry Date</label>

<input
type="text"
id="expiry"
maxlength="5"
placeholder="MM/YY"
required>

</div>

<div class="input-box">

<label>CVV</label>

<input
type="password"
id="cvv"
maxlength="4"
placeholder="123"
required>

</div>

</div>

<div class="payment-methods">

<h3>Supported Cards</h3>

<div class="cards">

<i class="fa-brands fa-cc-visa"></i>

<i class="fa-brands fa-cc-mastercard"></i>

<i class="fa-brands fa-cc-amex"></i>

</div>

</div>

<button type="submit">

Pay Now

</button>

</form>

<div class="secure">

<i class="fa-solid fa-lock"></i>

SSL Secured Payment

</div>

</div>

</div>

</section>

<!-- Footer -->

<footer>

<p>

© 2026 R&Y Event (PVT) Ltd.
All Rights Reserved.

</p>

</footer>

<script src="js/payment.js"></script>

</body>

</html>
