<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | R&Y Event</title>

<link rel="stylesheet" href="admin.css">

</head>


<body>



<header>

<h1>
R&Y Event Admin
</h1>


<a href="home.html">
Home
</a>


</header>




<div class="admin-container">


<div class="add-box">


<h2>
Add New Event
</h2>



<form id="eventForm">


<input 
type="text"
id="eventName"
placeholder="Event Name"
required>



<input 
type="date"
id="eventDate"
required>



<input 
type="text"
id="eventLocation"
placeholder="Location"
required>



<input 
type="number"
id="eventPrice"
placeholder="Ticket Price"
required>



<button>
Add Event
</button>



</form>


</div>





<div class="event-box">


<h2>
Event List
</h2>


<div id="adminEvents">


</div>



</div>



</div>




<script src="admin.js"></script>


</body>

</html>
