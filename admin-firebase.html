<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Firebase Admin | R&Y Event</title>

<link rel="stylesheet" href="admin.css">

</head>


<body>


<header>

<h1>
R&Y Event Admin
</h1>


<button id="logout">
Logout
</button>


</header>



<div class="admin-container">


<div class="add-box">


<h2>
Add Event
</h2>



<form id="eventForm">


<input 
id="name"
placeholder="Event Name"
required>


<input 
type="date"
id="date"
required>


<input 
id="location"
placeholder="Location"
required>


<input 
type="number"
id="price"
placeholder="Ticket Price"
required>


<button>
Add Event
</button>


</form>


</div>





<div class="event-box">


<h2>
All Events
</h2>


<div id="eventList">

</div>


</div>


</div>




<script type="module" src="admin-firebase.js"></script>


</body>

</html>
